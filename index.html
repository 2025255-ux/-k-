<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>3D P2P - 視点改善＆長押しジャンプ版</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
    
    /* ＝＝＝ UI画面共通のスタイル ＝＝＝ */
    .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #1e3c72, #2a5298); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .box { background: rgba(0,0,0,0.7); padding: 30px; border-radius: 12px; text-align: center; width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); pointer-events: auto; }
    .box h1 { margin-top: 0; font-size: 24px; color: #FFCC00; }
    .box input { font-size: 16px; padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: none; text-align: center; }
    .btn-main { font-size: 16px; padding: 12px; margin-top: 10px; width: 100%; border-radius: 6px; border: none; background: #007AFF; color: white; font-weight: bold; cursor: pointer; }
    .btn-sub { font-size: 14px; padding: 10px; margin-top: 10px; width: 100%; border-radius: 6px; border: none; background: #555; color: white; cursor: pointer; }
    .error-msg { color: #ff5555; font-size: 14px; margin-top: 10px; min-height: 20px; font-weight: bold; }
    .toggle-group { display: flex; justify-content: space-around; margin-bottom: 15px; }
    .toggle-group label { background: #333; padding: 8px 15px; border-radius: 20px; cursor: pointer; color: #aaa; font-size: 14px; width: 45%; }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-group input[type="radio"]:checked + label { background: #FFCC00; color: black; font-weight: bold; }

    /* ＝＝＝ ゲーム内UIのスタイル ＝＝＝ */
    #game-ui { display: none; }
    #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; z-index: 10; font-size: 12px; max-width: 180px; pointer-events: auto; }
    #ui input, #ui button { font-size: 14px; padding: 6px; margin: 4px 0; width: 100%; box-sizing: border-box; border-radius: 4px; border: none; }
    #ui button { background: #FF9500; color: white; font-weight: bold; }
    
    #camera-modes { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: auto; }
    .cam-btn { background: rgba(0,0,0,0.7); color: white; border: 1px solid #fff; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; width: 80px; }
    .cam-btn.active { background: #007AFF; border-color: #007AFF; }

    #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); z-index: 20; touch-action: none; }
    #joystick-knob { width: 50px; height: 50px; background: rgba(255,255,255,0.7); border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); pointer-events: none; }

    #jump-btn { position: absolute; bottom: 50px; right: 40px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.6); color: white; font-weight: bold; font-size: 16px; z-index: 20; touch-action: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    #jump-btn:active { background: rgba(255,255,255,0.8); color: black; }
  </style>
</head>
<body>

  <div id="auth-screen" class="screen">
    <div class="box">
      <h1>タイトル</h1>
      <div class="toggle-group">
        <input type="radio" id="mode-login" name="auth-mode" value="login" checked>
        <label for="mode-login">ログイン</label>
        <input type="radio" id="mode-register" name="auth-mode" value="register">
        <label for="mode-register">新規登録</label>
      </div>
      <input type="text" id="auth-id" placeholder="プレイヤーID (半角英数のみ)">
      <input type="password" id="auth-pass" placeholder="パスワード">
      <button id="auth-submit-btn" class="btn-main">ログインする</button>
      <div id="auth-error" class="error-msg"></div>
    </div>
  </div>

  <div id="home-screen" class="screen" style="display: none;">
    <div class="box">
      <h1>マイページ</h1>
      <p style="margin-bottom: 5px;">ようこそ、<strong id="home-nickname" style="color:#00FF00; font-size: 18px;"></strong> さん</p>
      <p style="font-size: 12px; color: #ccc; margin-bottom: 20px;">ID: <span id="home-id"></span></p>
      
      <button id="btn-to-game" class="btn-main" style="background: #FF9500;">世界に入る</button>
      <button id="btn-to-settings" class="btn-sub">設定変更</button>
      <button id="btn-logout" class="btn-sub" style="background: #aa3333; margin-top: 20px;">ログアウト</button>
    </div>
  </div>

  <div id="settings-screen" class="screen" style="display: none;">
    <div class="box">
      <h1 style="color: #fff;">設定</h1>
      <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 14px;">ニックネーム (ゲーム内の頭上に表示したい名前)</label>
        <input type="text" id="set-nickname" placeholder="新しいニックネーム">
      </div>
      <div style="text-align: left; margin-bottom: 20px; font-size: 14px;">
        <label>
          <input type="checkbox" id="set-show-hand" style="width: auto; margin-right: 10px;">
          1人称で「手と剣」を表示する
        </label>
      </div>
      <button id="btn-save-settings" class="btn-main">保存して戻る</button>
    </div>
  </div>

  <div id="game-ui">
    <div id="ui">
      <div>名前: <strong id="display-name" style="color:#FFCC00;"></strong></div>
      <div>ID: <span id="display-id" style="font-size: 10px; color:#aaa;"></span></div>
      <input type="text" id="peer-id-input" placeholder="友達のIDを入力">
      <button id="connect-btn">フレンドの所へワープ</button>
      <div id="status" style="margin-top: 5px; color: #55FF55;">準備完了</div>
      <button id="btn-back-home" style="background: #555; margin-top: 10px; font-size: 12px;">ホームに戻る</button>
    </div>
    <div id="camera-modes">
      <button class="cam-btn" id="cam-1">1人称</button>
      <button class="cam-btn" id="cam-2">2人称</button>
      <button class="cam-btn" id="cam-3">3人称</button>
    </div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <button id="jump-btn">JUMP</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    // --- データベース(ローカルストレージ) ---
    let accountsDB = JSON.parse(localStorage.getItem("p2pAccountsDB")) || {};
    let currentAccount = null;
    let currentId = null;

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      if (screenId === 'game-ui') {
        document.getElementById('game-ui').style.display = 'block';
      } else {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById(screenId).style.display = 'flex';
      }
    }

    // --- 1. ログイン / 新規登録 ---
    const modeRadios = document.querySelectorAll('input[name="auth-mode"]');
    const authBtn = document.getElementById('auth-submit-btn');
    const errorMsg = document.getElementById('auth-error');

    modeRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        authBtn.innerText = e.target.value === 'login' ? 'ログインする' : '登録して始める';
        errorMsg.innerText = '';
      });
    });

    authBtn.addEventListener('click', () => {
      const mode = document.querySelector('input[name="auth-mode"]:checked').value;
      const id = document.getElementById('auth-id').value.trim();
      const pass = document.getElementById('auth-pass').value.trim();

      if (!/^[a-zA-Z0-9_-]+$/.test(id)) {
        errorMsg.innerText = "IDは「半角英数字とハイフン(-)」のみにしてください";
        return;
      }
      if (id.length < 3 || pass.length < 3) {
        errorMsg.innerText = "IDとパスワードは3文字以上にしてください";
        return;
      }

      if (mode === 'register') {
        if (accountsDB[id]) {
          errorMsg.innerText = "そのIDはすでに登録されています";
        } else {
          accountsDB[id] = { password: pass, nickname: id, showHand: true };
          localStorage.setItem("p2pAccountsDB", JSON.stringify(accountsDB));
          loginSuccess(id);
        }
      } else {
        if (!accountsDB[id] || accountsDB[id].password !== pass) {
          errorMsg.innerText = "IDかパスワードが間違っています";
        } else {
          loginSuccess(id);
        }
      }
    });

    function loginSuccess(id) {
      currentId = id;
      currentAccount = accountsDB[id];
      document.getElementById('auth-id').value = '';
      document.getElementById('auth-pass').value = '';
      updateHome();
      showScreen('home-screen');
    }

    // --- 2. ホーム画面 / ログアウト ---
    function updateHome() {
      document.getElementById('home-nickname').innerText = currentAccount.nickname;
      document.getElementById('home-id').innerText = currentId;
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
      if (peer) {
        peer.destroy(); 
        peer = null;
      }
      currentId = null;
      currentAccount = null;
      showScreen('auth-screen');
    });

    // --- 3. 設定画面 ---
    document.getElementById('btn-to-settings').addEventListener('click', () => {
      document.getElementById('set-nickname').value = currentAccount.nickname;
      document.getElementById('set-show-hand').checked = currentAccount.showHand;
      showScreen('settings-screen');
    });

    document.getElementById('btn-save-settings').addEventListener('click', () => {
      const newNick = document.getElementById('set-nickname').value.trim() || currentId;
      currentAccount.nickname = newNick;
      currentAccount.showHand = document.getElementById('set-show-hand').checked;
      
      accountsDB[currentId] = currentAccount;
      localStorage.setItem("p2pAccountsDB", JSON.stringify(accountsDB));
      
      updateHome();
      showScreen('home-screen');
    });

    // --- 4. ゲーム開始 & PeerJS 通信処理 ---
    let peer = null;
    let conn = null;

    document.getElementById('btn-to-game').addEventListener('click', () => {
      document.getElementById('btn-to-game').innerText = "接続中...";
      
      if (peer) {
        peer.destroy();
      }

      peer = new Peer(currentId, {
        config: {
          'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
          ]
        }
      });

      peer.on('open', (id) => {
        document.getElementById('display-name').innerText = currentAccount.nickname;
        document.getElementById('display-id').innerText = currentId;
        showScreen('game-ui');
        document.getElementById('btn-to-game').innerText = "世界に入る";
      });

      peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          alert("【エラー】前の通信がサーバーに残っています。\n約1分ほど待ってからもう一度押してください。");
        } else if (err.type === 'invalid-id') {
          alert("【エラー】IDに不正な文字が含まれています。");
        } else {
          alert("【通信エラー】\n詳細: " + err.type + "\n通信環境を確認してやり直してください。");
        }
        document.getElementById('btn-to-game').innerText = "世界に入る";
      });

      peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
      });
    });

    document.getElementById('btn-back-home').addEventListener('click', () => {
      if (peer) {
        peer.destroy(); 
        peer = null;
      }
      showScreen('home-screen');
    });

    document.getElementById('connect-btn').addEventListener('click', () => {
      const friendId = document.getElementById('peer-id-input').value.trim();
      if (friendId && friendId !== currentId) {
        document.getElementById('status').innerText = "通信中...";
        conn = peer.connect(friendId);
        setupConnection();
      }
    });

    function setupConnection() {
      document.getElementById('status').innerText = "フレンドと合流！";
      conn.on('data', (data) => {
        if (data.type === 'move') {
          otherPlayer.position.set(data.x, data.y, data.z);
          otherPlayer.rotation.y = data.ry; 
        }
      });
    }

    function sendPosition() {
      if (conn && conn.open) {
        conn.send({
          type: 'move',
          x: myPlayer.position.x,
          y: myPlayer.position.y,
          z: myPlayer.position.z,
          ry: myPlayer.rotation.y
        });
      }
    }

    // --- 5. 3D空間 (Three.js) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x606060));

    const floorGeo = new THREE.PlaneGeometry(60, 60);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    
    const grid = new THREE.GridHelper(60, 60, 0x000000, 0x33aa33);
    grid.position.y = 0.01;
    scene.add(grid);

    const geometry = new THREE.BoxGeometry(1, 2, 1);
    const noseGeo = new THREE.BoxGeometry(0.2, 0.2, 0.4);
    const noseMat = new THREE.MeshLambertMaterial({ color: 0xffff00 });

    const myPlayer = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({ color: 0xff0000 }));
    myPlayer.position.set(0, 1, 0); 
    const myNose = new THREE.Mesh(noseGeo, noseMat);
    myNose.position.set(0, 0.5, -0.5); 
    myPlayer.add(myNose);
    scene.add(myPlayer);

    const otherPlayer = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({ color: 0x0000ff }));
    otherPlayer.position.set(0, 1, -5);
    const otherNose = new THREE.Mesh(noseGeo, noseMat);
    otherNose.position.set(0, 0.5, -0.5);
    otherPlayer.add(otherNose);
    scene.add(otherPlayer);

    // カメラにくっつける「手と剣」
    const armGroup = new THREE.Group();
    const armGeo = new THREE.BoxGeometry(0.15, 0.15, 0.5);
    const armMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
    const arm = new THREE.Mesh(armGeo, armMat);
    arm.position.set(0, 0, 0);
    armGroup.add(arm);

    const swordBladeGeo = new THREE.BoxGeometry(0.04, 0.8, 0.08);
    const swordBladeMat = new THREE.MeshLambertMaterial({ color: 0xdddddd });
    const swordBlade = new THREE.Mesh(swordBladeGeo, swordBladeMat);
    swordBlade.position.set(0, 0.5, -0.2);
    swordBlade.rotation.x = Math.PI / 6; 
    armGroup.add(swordBlade);

    armGroup.position.set(0.4, -0.3, -0.6);
    camera.add(armGroup);
    scene.add(camera);

    // --- 6. 操作管理 ---
    let cameraMode = 3; 
    let myYaw = 0;      
    let myPitch = 0;    

    function changeCameraMode(mode) {
      cameraMode = mode;
      document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`cam-${mode}`).classList.add('active');
    }
    ['touchstart', 'mousedown'].forEach(evt => {
      document.getElementById('cam-1').addEventListener(evt, (e) => { e.preventDefault(); changeCameraMode(1); });
      document.getElementById('cam-2').addEventListener(evt, (e) => { e.preventDefault(); changeCameraMode(2); });
      document.getElementById('cam-3').addEventListener(evt, (e) => { e.preventDefault(); changeCameraMode(3); });
    });
    changeCameraMode(3);

    let stickTouchId = null;
    let swipeTouchId = null;
    const stickContainer = document.getElementById('joystick-container');
    const stickKnob = document.getElementById('joystick-knob');
    let stickStartX, stickStartY;
    let joystickX = 0, joystickZ = 0; 
    const maxRadius = 40; 
    let prevSwipeTouchX = 0, prevSwipeTouchY = 0;

    let velocityY = 0;
    const gravity = -0.015;  
    const jumpPower = 0.173; 
    let isGrounded = true;   
    let isJumpPressed = false; // ★追加：ジャンプボタン長押し判定フラグ

    // ★変更：ジャンプボタンの押し・離しを検知
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      isJumpPressed = true;
    });
    document.getElementById('jump-btn').addEventListener('touchend', (e) => {
      e.preventDefault();
      isJumpPressed = false;
    });
    document.getElementById('jump-btn').addEventListener('touchcancel', () => {
      isJumpPressed = false;
    });

    window.addEventListener('touchstart', (e) => {
      if (document.getElementById("game-ui").style.display === "none") return;
      for (let i = 0; i < e.changedTouches.length; i++) {
        let touch = e.changedTouches[i];
        if (touch.target.closest('#joystick-container') && stickTouchId === null) {
          stickTouchId = touch.identifier;
          const rect = stickContainer.getBoundingClientRect();
          stickStartX = rect.left + rect.width / 2;
          stickStartY = rect.top + rect.height / 2;
          stickKnob.style.transition = 'none';
        } 
        else if (!touch.target.closest('#ui') && !touch.target.closest('.cam-btn') && !touch.target.closest('#jump-btn') && swipeTouchId === null) {
          swipeTouchId = touch.identifier;
          prevSwipeTouchX = touch.clientX;
          prevSwipeTouchY = touch.clientY;
        }
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (document.getElementById("game-ui").style.display === "none") return;
      for (let i = 0; i < e.changedTouches.length; i++) {
        let touch = e.changedTouches[i];
        if (touch.identifier === stickTouchId) {
          const deltaX = touch.clientX - stickStartX;
          const deltaY = touch.clientY - stickStartY;
          const dist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
          const limitedDist = Math.min(dist, maxRadius);
          const angle = Math.atan2(deltaY, deltaX);
          const moveX = Math.cos(angle) * limitedDist;
          const moveY = Math.sin(angle) * limitedDist;
          stickKnob.style.transform = `translate(${moveX}px, ${moveY}px)`;
          joystickX = moveX / maxRadius;
          joystickZ = moveY / maxRadius;
        } 
        else if (touch.identifier === swipeTouchId) {
          const deltaX = touch.clientX - prevSwipeTouchX;
          const deltaY = touch.clientY - prevSwipeTouchY;
          myYaw -= deltaX * 0.007;     
          myPitch -= deltaY * 0.005;   
          myPitch = Math.max(-Math.PI/3, Math.min(Math.PI/4, myPitch)); 
          prevSwipeTouchX = touch.clientX;
          prevSwipeTouchY = touch.clientY;
        }
      }
    });

    window.addEventListener('touchend', (e) => {
      for (let i = 0; i < e.changedTouches.length; i++) {
        let touch = e.changedTouches[i];
        if (touch.identifier === stickTouchId) {
          stickTouchId = null;
          stickKnob.style.transition = 'transform 0.2s ease-out';
          stickKnob.style.transform = 'translate(0px, 0px)'; 
          joystickX = 0;
          joystickZ = 0;
        } 
        else if (touch.identifier === swipeTouchId) {
          swipeTouchId = null;
        }
      }
    });

    // --- 7. ゲームループ ---
    const speed = 0.18; 

    function animate() {
      requestAnimationFrame(animate);

      // ★追加：1人称の時は鼻（黄色い四角）を消す
      myNose.visible = (cameraMode !== 1);

      // 手と剣の表示制御
      if (currentAccount && cameraMode === 1 && currentAccount.showHand) {
        armGroup.visible = true;
      } else {
        armGroup.visible = false;
      }

      myPlayer.rotation.y = myYaw;
      let moved = false;

      if (joystickX !== 0 || joystickZ !== 0) {
        myPlayer.position.x += (Math.sin(myYaw) * joystickZ + Math.cos(myYaw) * joystickX) * speed;
        myPlayer.position.z += (Math.cos(myYaw) * joystickZ - Math.sin(myYaw) * joystickX) * speed;
        moved = true;
      }

      // ★変更：ボタン長押しで、地面にいる状態ならジャンプする
      if (isGrounded && isJumpPressed) {
        velocityY = jumpPower;
        isGrounded = false;
      }

      if (!isGrounded) {
        velocityY += gravity; 
        myPlayer.position.y += velocityY; 
        moved = true;
        if (myPlayer.position.y <= 1.0) {
          myPlayer.position.y = 1.0;
          velocityY = 0;
          isGrounded = true;
        }
      }

      if (moved || swipeTouchId !== null) {
        sendPosition();
      }

      if (cameraMode === 1) {
        camera.position.set(myPlayer.position.x, myPlayer.position.y + 0.6, myPlayer.position.z);
        const targetX = myPlayer.position.x - Math.sin(myYaw) * Math.cos(myPitch);
        const targetY = myPlayer.position.y + 0.6 + Math.sin(myPitch);
        const targetZ = myPlayer.position.z - Math.cos(myYaw) * Math.cos(myPitch);
        camera.lookAt(targetX, targetY, targetZ);
      } else if (cameraMode === 2) {
        camera.position.set(otherPlayer.position.x, otherPlayer.position.y + 0.8, otherPlayer.position.z);
        camera.lookAt(myPlayer.position.x, myPlayer.position.y + 0.5, myPlayer.position.z);
      } else {
        const dist = 7; 
        camera.position.x = myPlayer.position.x + Math.sin(myYaw) * Math.cos(myPitch) * dist;
        camera.position.y = myPlayer.position.y + 2.0 + Math.sin(myPitch) * dist;
        camera.position.z = myPlayer.position.z + Math.cos(myYaw) * Math.cos(myPitch) * dist;
        camera.lookAt(myPlayer.position.x, myPlayer.position.y + 0.5, myPlayer.position.z);
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
